<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Academic System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>

<div class="login-card text-center">
    <h3 class="mb-4">Staff Login</h3>
    <div id="errorMessage" class="alert alert-danger d-none">Invalid Credentials!</div>
    
    <input type="text" id="username" class="form-control mb-3" placeholder="Username">
    <input type="password" id="password" class="form-control mb-3" placeholder="Password">
    
    <button onclick="checkLogin()" class="btn btn-primary w-100">Login</button>
</div>

<script>
    function checkLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // ഇവിടെ നിങ്ങൾക്ക് ഇഷ്ടമുള്ള യൂസർനെയിമും പാസ്‌വേഡും നൽകാം
        if (user === "admin" && pass === "sjcc123") {
            // ലോഗിൻ സക്സസ് ആയാൽ ഒരു സെഷൻ ടോക്കൺ സേവ് ചെയ്യുന്നു
            sessionStorage.setItem("isLoggedIn", "true");
            window.location.href = "index.html"; // മെയിൻ പേജിലേക്ക് പോകുന്നു
        } else {
            document.getElementById('errorMessage').classList.remove('d-none');
        }
    }
</script>

</body>
</html>
